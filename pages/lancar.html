<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
        <h3 class="text-lg font-bold text-gray-900">Lançar Dia de Corrida</h3>
        <form id="form-lancamento" class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Data</label>
                <input type="date" id="campo-data" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5" required>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">Uber (R$)</label>
                    <input type="number" step="0.01" id="val-uber" placeholder="0.00" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">99Pop (R$)</label>
                    <input type="number" step="0.01" id="val-99" placeholder="0.00" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-1">Particular</label>
                    <input type="number" step="0.01" id="val-particular" placeholder="0.00" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">KM Rodados no Dia</label>
                <input type="number" step="0.1" id="val-km" placeholder="Ex: 140" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5" required>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Alimentação (R$)</label>
                    <input type="number" step="0.01" id="val-alimento" placeholder="0.00" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pedágio (R$)</label>
                    <input type="number" step="0.01" id="val-pedagio" placeholder="0.00" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2">
                </div>
            </div>
            <button type="submit" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl mt-2 shadow-md">Salvar Registro</button>
        </form>
    </div>

    <script src="../supabase-config.js"></script>
    <script src="../app.js"></script>
    <script>
        window.onload = () => {
            configurarFormLancamento();
        };
    </script>
</body>
</html>
