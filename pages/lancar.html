<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 p-4 pb-12 space-y-4">

    <div class="max-w-md mx-auto space-y-4">
        
        <div class="flex items-center gap-2 px-1">
            <i data-lucide="plus-circle" class="w-5 h-5 text-emerald-500"></i>
            <h2 class="text-base font-black text-gray-800 uppercase tracking-wider">Novo Lançamento Inteligente</h2>
        </div>

        <form id="form-lancamento" class="space-y-4">
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block">Data da Corrida</label>
                <div class="relative">
                    <i data-lucide="calendar" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                    <input type="date" id="campo-data" required class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-10 pr-3 font-bold text-gray-800 text-sm focus:outline-emerald-500 focus:bg-white transition">
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block">Faturamento por App (Entradas)</label>
                
                <div class="space-y-2">
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-bold text-gray-400">Uber R$</span>
                        <input type="number" step="0.01" id="val-uber" placeholder="0,00" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-18 pr-3 text-right font-black text-gray-900 text-sm focus:outline-emerald-500 focus:bg-white transition">
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-bold text-gray-400">99 R$</span>
                        <input type="number" step="0.01" id="val-99" placeholder="0,00" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-18 pr-3 text-right font-black text-gray-900 text-sm focus:outline-emerald-500 focus:bg-white transition">
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-bold text-gray-400">Part. R$</span>
                        <input type="number" step="0.01" id="val-particular" placeholder="0,00" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-18 pr-3 text-right font-black text-gray-900 text-sm focus:outline-emerald-500 focus:bg-white transition">
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block">Métricas de Desempenho</label>
                
                <div class="grid grid-cols-2 gap-2">
                    <div class="relative">
                        <i data-lucide="gauge" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="number" step="0.1" id="val-km" required placeholder="KM Rodado" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-9 pr-3 text-right font-bold text-gray-800 text-sm focus:outline-emerald-500 focus:bg-white transition">
                    </div>
                    <div class="relative">
                        <i data-lucide="clock" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="number" step="0.1" id="val-horas" required placeholder="Horas Trab." class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-9 pr-3 text-right font-bold text-gray-800 text-sm focus:outline-emerald-500 focus:bg-white transition">
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider block">Gastos Extras (Saídas)</label>
                
                <div class="grid grid-cols-2 gap-2">
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-bold text-gray-400">Alim. R$</span>
                        <input type="number" step="0.01" id="val-alimento" placeholder="0,00" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-16 pr-3 text-right font-bold text-gray-800 text-sm focus:outline-emerald-500 focus:bg-white transition">
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-bold text-gray-400">Ped. R$</span>
                        <input type="number" step="0.01" id="val-pedagio" placeholder="0,00" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-16 pr-3 text-right font-bold text-gray-800 text-sm focus:outline-emerald-500 focus:bg-white transition">
                    </div>
                </div>
                <p class="text-[10px] text-gray-400 font-medium italic mt-1">O gasto com combustível é calculado de forma 100% automática com base nos KM.</p>
            </div>

            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-3 rounded-xl shadow-md transition flex items-center justify-center gap-2 uppercase tracking-wider text-xs">
                <i data-lucide="check-circle" class="w-4 h-4"></i> Salvar Entrada Inteligente
            </button>

        </form>
    </div>

    <script src="../supabase-config.js"></script>
    <script src="../app.js"></script>
    <script>
        // Renderiza os ícones do Lucide na tela
        lucide.createIcons();

        // Aciona o inicializador do formulário mapeado no seu app.js
        window.onload = () => {
            if(typeof configurarFormLancamento === 'function') {
                configurarFormLancamento();
            }
        };
    </script>
</body>
</html>
