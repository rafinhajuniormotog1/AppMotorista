<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" href="../favicon.png" type="image/png">
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
        <h3 class="text-lg font-bold text-gray-900">Parâmetros de Consumo Fixo</h3>
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Média do Veículo (KM / Litro)</label>
                <input type="number" step="0.1" id="cfg-media" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Preço do Litro do Combustível (R$)</label>
                <input type="number" step="0.001" id="cfg-preco" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5">
            </div>
            <button onclick="gravarConfiguracoesNuvem()" class="w-full bg-gray-900 text-white font-bold py-2.5 rounded-xl">Salvar na Nuvem</button>
        </div>
    </div>

    <script src="../supabase-config.js"></script>
    <script src="../app.js"></script>
    <script>
        window.onload = () => {
            configurarPainelConfigFixo();
        };
    </script>
</body>
</html>
